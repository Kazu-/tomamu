<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北海道 夏の旅 2026 ｜ 旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--mist:#E9F1F4;--ink:#153845;--ink-soft:#3E5C68;--sky:#4E8FB5;--sky-deep:#2F6B8E;--pasture:#7C9A57;--corn:#E7A93A;--cloud:#FFFFFF;--line:#D3E0E6;--paper:#FBF8F1;--shadow:0 6px 24px rgba(21,56,69,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#DCE7EC;line-height:1.7;letter-spacing:.01em}

  /* ===== BOOK ===== */
  .bookwrap{position:relative;max-width:720px;margin:0 auto;padding:12px 10px 8px}
  .book{display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;height:86vh;border-radius:16px;scrollbar-width:none}
  .book::-webkit-scrollbar{display:none}
  .page{position:relative;flex:0 0 100%;scroll-snap-align:center;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--paper);border-radius:16px;padding:22px 20px 44px;
    box-shadow:0 12px 34px rgba(21,56,69,.18);
    background-image:linear-gradient(90deg,rgba(21,56,69,.07),rgba(21,56,69,0) 5%,rgba(21,56,69,0) 96%,rgba(21,56,69,.03));-webkit-overflow-scrolling:touch}
  .page::after{content:"";position:absolute;top:0;right:0;bottom:0;width:12px;background:linear-gradient(90deg,rgba(21,56,69,0),rgba(21,56,69,.05));border-radius:0 16px 16px 0;pointer-events:none}
  .page-num{position:absolute;bottom:12px;right:18px;font-family:"Zen Maru Gothic";font-size:.72rem;color:#B4A88C;z-index:2}
  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:30;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.92);box-shadow:0 3px 10px rgba(21,56,69,.22);font-size:1.4rem;line-height:1;color:var(--sky-deep);cursor:pointer;display:grid;place-items:center;font-family:"Zen Maru Gothic"}
  .nav:active{transform:translateY(-50%) scale(.92)}
  .nav.prev{left:0}.nav.next{right:0}
  .nav:disabled{opacity:.28;cursor:default}
  .pager-dots{display:flex;justify-content:center;gap:7px;margin-top:10px}
  .dot{width:8px;height:8px;border-radius:50%;background:#B7C7CF;transition:all .25s;cursor:pointer}
  .dot.active{background:var(--sky);width:22px;border-radius:5px}

  /* ===== COVER ===== */
  .cover{background:linear-gradient(180deg,#2B5B7A 0%,#4E8FB5 48%,#EBC77F 100%);color:#fff;text-align:center;background-image:none;overflow:hidden;padding-top:38px}
  .cover::after{display:none}
  .cover .eyebrow{font-family:"Zen Maru Gothic";font-weight:700;letter-spacing:.32em;font-size:.72rem;opacity:.92;margin-bottom:14px;padding-left:.32em}
  .cover h1{font-family:"Zen Maru Gothic";font-weight:900;font-size:2.6rem;line-height:1.2;text-shadow:0 2px 12px rgba(21,56,69,.28)}
  .cover h1 .sub{display:block;font-size:1rem;font-weight:700;margin-top:10px;letter-spacing:.05em}
  .cover .dates{margin-top:20px;display:inline-flex;align-items:center;gap:10px;font-family:"Zen Maru Gothic";font-weight:700;font-size:1rem;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.55);padding:8px 20px;border-radius:999px}
  .cover .dates b{font-size:1.1rem}.nights{font-size:.78rem;opacity:.92;font-weight:500}
  .cover-scene{margin:18px -20px 0;width:calc(100% + 40px)}
  .cover-scene svg{width:100%;height:96px;display:block}
  .cover .page-num{color:rgba(255,255,255,.85)}
  .usage{margin-top:8px;font-size:.76rem;color:rgba(255,255,255,.92);font-weight:700;font-family:"Zen Maru Gothic";line-height:1.9}

  /* ===== GAME PANEL ===== */
  .gamepanel{margin:16px auto 0;max-width:420px;background:rgba(255,255,255,.94);border-radius:16px;padding:14px 16px;box-shadow:0 6px 20px rgba(21,56,69,.18);color:var(--ink);text-align:left}
  .gamepanel h4{font-family:"Zen Maru Gothic";font-weight:900;font-size:.98rem;color:var(--sky-deep)}
  .gp-sub{font-size:.76rem;color:var(--ink-soft);margin-top:3px;line-height:1.6}
  .gp-bar{height:14px;border-radius:8px;background:#DBE7EC;overflow:hidden;margin-top:11px}
  .gp-fill{height:100%;width:0;border-radius:8px;background:linear-gradient(90deg,#7FBBD9,#8FCB7A,#F0C24A);transition:width .5s ease}
  .gp-count{display:flex;justify-content:space-between;margin-top:7px;font-family:"Zen Maru Gothic";font-weight:700;font-size:.82rem;color:var(--ink)}
  .gp-badge{margin-top:11px;display:none;background:#FFF3D6;border-radius:10px;padding:9px 12px;font-family:"Zen Maru Gothic";font-weight:900;color:#9A6A12;font-size:.86rem;text-align:center}
  .gp-badge.show{display:block;animation:pop .4s}
  @keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.08)}100%{transform:scale(1)}}

  /* ===== DAY ===== */
  .day-head{display:flex;align-items:baseline;gap:14px;margin-bottom:4px;padding-left:2px}
  .day-num{font-family:"Zen Maru Gothic";font-weight:900;font-size:2.2rem;color:var(--sky);line-height:1}
  .day-num small{font-size:.72rem;display:block;letter-spacing:.28em;color:var(--pasture);margin-bottom:3px}
  .day-date{font-family:"Zen Maru Gothic";font-weight:700;font-size:1.05rem}
  .day-date span{font-size:.82rem;color:var(--ink-soft);margin-left:6px;font-weight:500}
  .day-title{margin-left:auto;font-size:.78rem;color:var(--sky-deep);font-weight:700;text-align:right;max-width:44%}
  .day-rule{height:2px;background:linear-gradient(90deg,var(--sky),transparent);border-radius:2px;margin:8px 0 4px}
  .timeline{position:relative;margin:12px 0 0;padding-left:24px}
  .timeline::before{content:"";position:absolute;left:6px;top:12px;bottom:12px;width:2px;background:linear-gradient(180deg,var(--sky),var(--pasture));border-radius:2px}
  .stop{position:relative;padding:9px 0}
  .stop::before{content:"";position:absolute;left:-23px;top:24px;width:11px;height:11px;border-radius:50%;background:#fff;border:3px solid var(--sky);z-index:1}
  .stop.corn::before{border-color:var(--corn);background:#FFF6E4}
  .stop.green::before{border-color:var(--pasture)}
  .card{display:flex;gap:12px;align-items:center;background:var(--cloud);border-radius:14px;box-shadow:var(--shadow);padding:11px 12px;border-left:4px solid var(--line);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;position:relative;-webkit-tap-highlight-color:transparent}
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(21,56,69,.14)}
  .card:active{transform:translateY(0) scale(.99)}
  .card:focus-visible{outline:3px solid var(--sky);outline-offset:2px}
  .stop.corn .card{border-left-color:var(--corn)}.stop.green .card{border-left-color:var(--pasture)}.stop.sky .card{border-left-color:var(--sky)}
  .card-body{flex:1;min-width:0}
  .thumb{flex:0 0 62px;width:62px;height:62px;border-radius:11px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(21,56,69,.07);position:relative}
  .thumb svg{width:100%;height:100%;display:block}
  .chev{position:absolute;right:11px;bottom:9px;font-size:.64rem;color:var(--sky);font-weight:700;font-family:"Zen Maru Gothic";opacity:.75}
  .time{font-family:"Zen Maru Gothic";font-weight:700;font-size:.82rem;color:var(--sky-deep);letter-spacing:.03em}
  .stop h3{font-family:"Zen Maru Gothic";font-weight:700;font-size:.98rem;margin-top:1px;line-height:1.35}
  .stop .note{font-size:.78rem;color:var(--ink-soft);margin-top:3px}
  .stop .ref{display:inline-block;font-family:"Zen Maru Gothic";font-weight:700;background:#FBF3DE;color:#9A6A12;border-radius:6px;padding:1px 8px;font-size:.74rem;margin-top:5px;letter-spacing:.05em}
  .route{display:flex;align-items:center;gap:8px;font-family:"Zen Maru Gothic";font-weight:700;font-size:1rem;margin-top:2px}
  .route .arw{color:var(--sky)}
  .airtime{font-size:.76rem;color:var(--ink-soft);font-weight:500;margin-top:1px}

  /* ===== INFO / END PAGE ===== */
  .page-title{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.3rem;color:var(--sky-deep);margin-bottom:4px}
  .info{background:var(--cloud);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;display:grid;gap:12px;margin-top:8px}
  .info-row{display:flex;gap:13px;align-items:flex-start}
  .info-ico{flex:0 0 38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:1.1rem;background:var(--mist)}
  .info-row h4{font-family:"Zen Maru Gothic";font-weight:700;font-size:.82rem;color:var(--sky-deep);letter-spacing:.04em}
  .info-row p{font-size:.85rem;color:var(--ink-soft);margin-top:2px}
  .ref2{display:inline-block;font-family:"Zen Maru Gothic";font-weight:700;background:#FBF3DE;color:#9A6A12;border-radius:6px;padding:1px 8px;font-size:.78rem;margin-top:3px;letter-spacing:.06em}
  .tel{color:var(--sky-deep);font-weight:700}
  .memo{margin-top:16px;background:#F3F8FA;border-radius:14px;padding:14px 16px}
  .memo h4{font-family:"Zen Maru Gothic";font-weight:900;font-size:.92rem;color:var(--sky-deep)}
  .memo ul{margin:8px 0 0;padding-left:18px;font-size:.84rem;color:var(--ink-soft)}
  .memo li{margin:3px 0}
  .end-mark{text-align:center;margin-top:22px;font-family:"Zen Maru Gothic";font-weight:900;color:var(--sky);font-size:1.05rem}
  .end-sub{text-align:center;color:var(--ink-soft);font-size:.82rem;margin-top:4px}

  /* ===== SHEET ===== */
  .backdrop{position:fixed;inset:0;background:rgba(21,56,69,.45);opacity:0;pointer-events:none;transition:opacity .28s ease;z-index:50;backdrop-filter:blur(2px)}
  .backdrop.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--cloud);border-radius:22px 22px 0 0;max-width:680px;margin:0 auto;max-height:88vh;overflow:hidden;transform:translateY(102%);transition:transform .32s cubic-bezier(.22,.8,.3,1);box-shadow:0 -10px 40px rgba(21,56,69,.25);display:flex;flex-direction:column}
  .sheet.open{transform:translateY(0)}
  @media(prefers-reduced-motion:reduce){.sheet,.backdrop{transition:none}}
  .sheet-grip{width:44px;height:5px;border-radius:3px;background:#CBD9E0;margin:10px auto 0;flex:0 0 auto}
  .sheet-hero{position:relative;height:148px;flex:0 0 auto;overflow:hidden;margin:12px 14px 0;border-radius:16px}
  .sheet-hero svg{width:100%;height:100%;display:block}
  .sheet-close{position:absolute;top:20px;right:22px;z-index:2;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.85);color:var(--ink);font-size:1.2rem;line-height:1;cursor:pointer;box-shadow:0 2px 8px rgba(21,56,69,.18)}
  .sheet-scroll{overflow-y:auto;padding:16px 22px 30px;-webkit-overflow-scrolling:touch}
  .sheet-time{font-family:"Zen Maru Gothic";font-weight:700;font-size:.82rem;color:var(--sky-deep);letter-spacing:.04em}
  .sheet-title{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.4rem;margin-top:2px;line-height:1.3}
  .sheet-lead{font-size:.9rem;color:var(--ink-soft);margin-top:8px}
  .tip{margin-top:14px;padding-left:14px;border-left:3px solid var(--mist)}
  .tip.h-corn{border-left-color:var(--corn)}.tip.h-green{border-left-color:var(--pasture)}.tip.h-sky{border-left-color:var(--sky)}
  .tip h5{font-family:"Zen Maru Gothic";font-weight:700;font-size:.92rem;color:var(--ink)}
  .tip p{font-size:.86rem;color:var(--ink-soft);margin-top:2px}
  .sheet-note{margin-top:18px;background:#FBF3DE;border-radius:12px;padding:11px 14px;font-size:.82rem;color:#8A5E10;line-height:1.6}
  .sheet-ref{display:inline-block;font-family:"Zen Maru Gothic";font-weight:700;background:#F0F6F8;color:var(--sky-deep);border-radius:8px;padding:4px 12px;font-size:.84rem;margin-top:12px;letter-spacing:.06em}
  .sheet-maps{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px}
  .map-link{display:inline-flex;align-items:center;gap:5px;font-family:"Zen Maru Gothic";font-weight:700;font-size:.83rem;text-decoration:none;color:#2F6B8E;background:#EAF4F8;border:1px solid #CFE3EC;border-radius:999px;padding:8px 14px}
  .map-link:hover{background:#DCEEF4}
  /* stamp + quiz */
  .stampbtn{flex:0 0 38px;width:38px;height:38px;border-radius:50%;border:2px dashed #C2D2DA;background:#fff;display:grid;place-items:center;cursor:pointer;font-size:1.1rem;color:#B9CBD4;transition:transform .15s;-webkit-tap-highlight-color:transparent;align-self:center;padding:0}
  .stampbtn:hover{transform:scale(1.08)}.stampbtn:active{transform:scale(.92)}
  .stampbtn.done{border-style:solid;border-color:var(--corn);background:#FFF3D6;color:#E7A93A;animation:stamp .38s}
  @keyframes stamp{0%{transform:scale(.4) rotate(-18deg);opacity:.3}60%{transform:scale(1.18) rotate(7deg)}100%{transform:scale(1) rotate(0)}}
  .thumb-stamp{position:absolute;inset:0;place-items:center;background:rgba(231,169,58,.16)}
  .thumb-stamp span{background:var(--corn);color:#fff;border-radius:8px;padding:2px 6px;font-family:"Zen Maru Gothic";font-weight:900;font-size:.68rem;transform:rotate(-12deg);box-shadow:0 2px 6px rgba(0,0,0,.22)}
  .bigstamp{margin-top:20px;width:100%;border:none;border-radius:14px;padding:14px;font-family:"Zen Maru Gothic";font-weight:900;font-size:1rem;cursor:pointer;color:#fff;background:linear-gradient(90deg,#F0B84A,#E79A3A);box-shadow:0 4px 14px rgba(231,169,58,.35);transition:transform .12s}
  .bigstamp:active{transform:scale(.98)}
  .bigstamp.done{background:linear-gradient(90deg,#7CB86A,#5D9A4C);box-shadow:0 4px 14px rgba(124,184,106,.35)}
  .quiz{margin-top:20px;background:#F3F8FA;border-radius:14px;padding:14px 15px}
  .quiz-q{font-family:"Zen Maru Gothic";font-weight:700;font-size:.95rem;color:var(--ink);line-height:1.5}
  .quiz-opts{display:flex;flex-direction:column;gap:8px;margin-top:11px}
  .quiz-opt{font-family:"Zen Maru Gothic";font-weight:700;font-size:.92rem;text-align:left;padding:10px 14px;border-radius:10px;border:2px solid #D3E0E6;background:#fff;color:var(--ink);cursor:pointer;transition:transform .1s}
  .quiz-opt:hover{transform:translateX(2px)}.quiz-opt:disabled{cursor:default}
  .quiz-opt.correct{border-color:#7CB86A;background:#E8F5E1;color:#4C7A3A}
  .quiz-opt.wrong{border-color:#E68A8A;background:#FBE9E9;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .quiz-fb{margin-top:11px;font-weight:700;font-size:.86rem;min-height:1.2em;line-height:1.5}
  .quiz-fb.ok{color:#4C7A3A}.quiz-fb.ng{color:#C05A5A}
  .confetti{position:fixed;top:-14px;width:9px;height:15px;z-index:100;border-radius:2px;pointer-events:none;animation:fall 2.2s linear forwards}
  @keyframes fall{to{transform:translateY(108vh) rotate(560deg);opacity:.85}}
  @media(prefers-reduced-motion:reduce){.confetti{display:none}}

  /* ===== LOGIN GATE ===== */
  .gate{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#2B5B7A 0%,#4E8FB5 55%,#EBC77F 100%);transition:opacity .6s ease}
  .gate.gone{opacity:0;pointer-events:none}
  .gate-inner{text-align:center;color:#fff;max-width:340px;width:100%}
  .gift{width:186px;height:172px;margin:0 auto 2px}
  .gift svg{width:100%;height:100%;overflow:visible;display:block}
  .gate-title{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.15rem;margin-top:8px;text-shadow:0 2px 8px rgba(21,56,69,.3)}
  .pass-dots{display:flex;justify-content:center;gap:14px;margin:16px 0 4px}
  .pass-dots span{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.35);transition:all .2s}
  .pass-dots span.on{background:#fff;transform:scale(1.15);box-shadow:0 0 10px rgba(255,255,255,.7)}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:236px;margin:14px auto 0}
  .key{font-family:"Zen Maru Gothic";font-weight:700;font-size:1.3rem;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);border-radius:14px;padding:12px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s,background .15s}
  .key:active{transform:scale(.94);background:rgba(255,255,255,.32)}
  .key.ghost{background:transparent;border:none;cursor:default}
  .gate-msg{min-height:1.4em;margin-top:12px;font-family:"Zen Maru Gothic";font-weight:700;font-size:.9rem;color:#FFE7B0}
  .gate.shake .gift{animation:gshake .4s}
  @keyframes gshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .gate-hint{margin-top:16px;font-size:.76rem;color:rgba(255,255,255,.85);font-weight:700;font-family:"Zen Maru Gothic"}
  #giftBow{transform-origin:95px 62px;transition:transform .6s ease,opacity .6s ease}
  .gift.open #giftBow{transform:translateY(-72px) scale(.25) rotate(45deg);opacity:0}
  .gift-strap{transition:opacity .5s ease .25s}
  .gift.open .gift-strap{opacity:0}
  #giftLid{transform-origin:95px 92px;transition:transform .7s cubic-bezier(.3,1.5,.5,1) .45s}
  .gift.open #giftLid{transform:translateY(-70px) rotate(-10deg)}
  .gift-spark{opacity:0}
  .gift.open .gift-spark{animation:sparkle .8s ease .6s forwards}
  @keyframes sparkle{0%{opacity:0;transform:scale(.4)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  .confetti{z-index:999}
  @media(prefers-reduced-motion:reduce){#giftBow,.gift-strap,#giftLid{transition:none}.gift.open .gift-spark{animation:none;opacity:1}}

  @media(max-width:420px){.cover h1{font-size:2.15rem}.stampbtn{flex-basis:34px;width:34px;height:34px;font-size:1rem}.day-title{max-width:100%;flex-basis:100%;text-align:left;margin:4px 0 0 0}.day-head{flex-wrap:wrap}}
  @media print{
    body{background:#fff}
    .nav,.pager-dots,.backdrop,.sheet,.confetti,.chev{display:none}
    .book{display:block;height:auto;overflow:visible;border-radius:0}
    .page{flex:none;height:auto;box-shadow:none;border-radius:0;page-break-after:always;background:#fff;background-image:none}
    .page::after{display:none}
    .cover{color:#153845 !important;background:#EAF2F5 !important}
    .cover h1,.usage,.cover .page-num{color:#153845 !important;text-shadow:none}
    .card{cursor:default;border:1px solid var(--line);box-shadow:none}
    svg{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>

<!-- ===== LOGIN GATE ===== -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gift" id="gift">
      <svg viewBox="0 0 190 172" aria-hidden="true">
        <rect x="45" y="95" width="100" height="70" rx="6" fill="#6BA8C9"/>
        <rect x="45" y="95" width="100" height="70" rx="6" fill="#5C9BBE" opacity=".0"/>
        <g id="giftLid"><rect x="37" y="76" width="116" height="26" rx="6" fill="#4E8FB5"/></g>
        <g class="gift-strap">
          <rect x="86" y="74" width="18" height="92" fill="#E7A93A"/>
          <rect x="45" y="120" width="100" height="18" fill="#E7A93A"/>
        </g>
        <g id="giftBow">
          <path d="M92 66 l-7 30 l9 -8 Z" fill="#E09A2E"/>
          <path d="M98 66 l7 30 l-9 -8 Z" fill="#E09A2E"/>
          <ellipse cx="80" cy="60" rx="15" ry="10" fill="#E7A93A" transform="rotate(-18 80 60)"/>
          <ellipse cx="110" cy="60" rx="15" ry="10" fill="#E7A93A" transform="rotate(18 110 60)"/>
          <ellipse cx="82" cy="60" rx="6" ry="4" fill="#C9821E" transform="rotate(-18 82 60)"/>
          <ellipse cx="108" cy="60" rx="6" ry="4" fill="#C9821E" transform="rotate(18 108 60)"/>
          <circle cx="95" cy="62" r="8" fill="#F0C24A"/>
          <circle cx="95" cy="62" r="4" fill="#C9821E"/>
        </g>
        <g class="gift-spark">
          <path d="M95 62 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3Z" fill="#FFF3C4"/>
          <circle cx="70" cy="78" r="3.5" fill="#FBE6A0"/>
          <circle cx="122" cy="74" r="3.5" fill="#FBE6A0"/>
          <path d="M112 58 l1.6 4.5 l4.5 1.6 l-4.5 1.6 l-1.6 4.5 l-1.6 -4.5 l-4.5 -1.6 l4.5 -1.6Z" fill="#fff"/>
        </g>

const SAVE_KEY='hokkaido2026_game_v2';try{localStorage.removeItem('hokkaido2026_game');}catch(e){}
function loadState(){try{const r=localStorage.getItem(SAVE_KEY);if(r){const o=JSON.parse(r);return{stamps:new Set(o.stamps||[]),quiz:new Set(o.quiz||[])};}}catch(e){}return{stamps:new Set(),quiz:new Set()};}
const _s=loadState();let stamps=_s.stamps, quizDone=_s.quiz;
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({stamps:[...stamps],quiz:[...quizDone]}));}catch(e){}}
let TOTAL=0, QTOTAL=0;

const gamePanel=document.getElementById('gamePanel');
gamePanel.innerHTML='<h4>🗺️ たびの スタンプラリー</h4>'+
  '<div class="gp-sub">行った ばしょを タップして、☆で スタンプを あつめよう！クイズも あるよ。</div>'+

const gpFill=document.getElementById('gpFill'),gpStamp=document.getElementById('gpStamp'),gpQuiz=document.getElementById('gpQuiz'),gpBadge=document.getElementById('gpBadge');
let wasComplete=stamps.size>=TOTAL;
function updateProgress(){const n=stamps.size;gpFill.style.width=(n/TOTAL*100)+'%';gpStamp.textContent='⭐ スタンプ '+n+'/'+TOTAL;gpQuiz.textContent='🧩 クイズ '+quizDone.size+'/'+QTOTAL;const c=n>=TOTAL;gpBadge.classList.toggle('show',c);if(c&&!wasComplete)confetti();wasComplete=c;}
function confetti(){if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;const cs=['#F0C24A','#7FBBD9','#8FCB7A','#EC6E9A','#9B7FC4'];for(let i=0;i<90;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cs[i%cs.length];c.style.animationDelay=(Math.random()*0.6)+'s';c.style.transform='rotate('+(Math.random()*360)+'deg)';document.body.appendChild(c);setTimeout(()=>c.remove(),2800);}}
function toggleStamp(k){if(stamps.has(k))stamps.delete(k);else stamps.add(k);saveState();updateCard(k);updateProgress();}
function updateCard(k){const card=document.querySelector('.card[data-spot="'+k+'"]');if(!card)return;const on=stamps.has(k);const sb=card.querySelector('.stampbtn');if(sb){sb.classList.toggle('done',on);sb.textContent=on?'★':'☆';}const ov=card.querySelector('.thumb-stamp');if(ov)ov.style.display=on?'grid':'none';if(currentKey===k){const bs=document.getElementById('bigstampbtn');if(bs){bs.className='bigstamp'+(on?' done':'');bs.textContent=on?'✓ スタンプ ゲット！（もう一度で とりけし）':'⭐ この ばしょの スタンプを おす！';}}}

const backdrop=document.getElementById('backdrop'),sheet=document.getElementById('sheet'),sheetUse=document.getElementById('sheetUse'),sheetTime=document.getElementById('sheetTime'),sheetTitle=document.getElementById('sheetTitle'),sheetLead=document.getElementById('sheetLead'),sheetTips=document.getElementById('sheetTips'),sheetRefWrap=document.getElementById('sheetRefWrap'),sheetNoteWrap=document.getElementById('sheetNoteWrap'),sheetMapsWrap=document.getElementById('sheetMapsWrap'),sheetQuiz=document.getElementById('sheetQuiz'),sheetStampWrap=document.getElementById('sheetStampWrap'),sheetScroll=sheet.querySelector('.sheet-scroll');
let lastFocused=null,currentKey=null;
function renderQuiz(k){const q=QUIZ[k];if(!q){sheetQuiz.innerHTML='';return;}const solved=quizDone.has(k);sheetQuiz.innerHTML='<div class="quiz"><div class="quiz-q">🧩 クイズ！ '+q.q+'</div><div class="quiz-opts">'+q.options.map((o,i)=>'<button class="quiz-opt" data-i="'+i+'">'+o+'</button>').join('')+'</div><div class="quiz-fb"></div></div>';const fb=sheetQuiz.querySelector('.quiz-fb'),opts=sheetQuiz.querySelectorAll('.quiz-opt');if(solved){opts.forEach((b,i)=>{b.disabled=true;if(i===q.answer)b.classList.add('correct');});fb.className='quiz-fb ok';fb.textContent='⭕ クリアずみ！ '+q.fun;}opts.forEach(btn=>btn.addEventListener('click',()=>{const i=+btn.dataset.i;if(i===q.answer){btn.classList.add('correct');opts.forEach(b=>b.disabled=true);fb.className='quiz-fb ok';fb.textContent='⭕ せいかい！ '+q.fun;if(!quizDone.has(k)){quizDone.add(k);saveState();updateProgress();}}else{btn.classList.add('wrong');fb.className='quiz-fb ng';fb.textContent='❌ ざんねん！ もういちど！';setTimeout(()=>btn.classList.remove('wrong'),450);}}));}
function openSheet(k){const d=SPOTS[k];if(!d)return;currentKey=k;lastFocused=document.activeElement;sheetUse.setAttribute('href','#'+d.ill);sheetTime.textContent=d.time||'';sheetTitle.textContent=d.title||'';sheetLead.textContent=d.lead||'';sheetTips.innerHTML=(d.tips||[]).map(t=>'<div class="tip h-'+(t.c||'sky')+'"><h5>'+t.h+'</h5><p>'+t.t+'</p></div>').join('');sheetRefWrap.innerHTML=d.ref?'<div class="sheet-ref">'+d.ref+'</div>':'';sheetNoteWrap.innerHTML=d.note?'<div class="sheet-note">'+d.note+'</div>':'';sheetMapsWrap.innerHTML=(d.map&&d.map.length)?'<div class="sheet-maps">'+d.map.map(m=>'<a class="map-link" target="_blank" rel="noopener" href="'+MAP+encodeURIComponent(m.q)+'">🗺️ '+m.label+'</a>').join('')+'</div>':'';renderQuiz(k);const on=stamps.has(k);sheetStampWrap.innerHTML='<button class="bigstamp'+(on?' done':'')+'" id="bigstampbtn">'+(on?'✓ スタンプ ゲット！（もう一度で とりけし）':'⭐ この ばしょの スタンプを おす！')+'</button>';document.getElementById('bigstampbtn').addEventListener('click',()=>toggleStamp(k));sheetScroll.scrollTop=0;backdrop.classList.add('open');sheet.classList.add('open');document.body.style.overflow='hidden';document.getElementById('sheetClose').focus();}
function closeSheet(){backdrop.classList.remove('open');sheet.classList.remove('open');document.body.style.overflow='';currentKey=null;if(lastFocused)lastFocused.focus();}

document.getElementById('sheetClose').addEventListener('click',closeSheet);backdrop.addEventListener('click',closeSheet);document.addEventListener('keydown',e=>{if(e.key==='Escape'&&sheet.classList.contains('open'))closeSheet();});

let pages=[],dots=[];
function curIndex(){return Math.round(book.scrollLeft/book.clientWidth);}
function go(i){i=Math.max(0,Math.min(pages.length-1,i));book.scrollTo({left:i*book.clientWidth,behavior:'smooth'});}
function syncNav(){const i=curIndex();navPrev.disabled=i<=0;navNext.disabled=i>=pages.length-1;dots.forEach((d,j)=>d.classList.toggle('active',j===i));}
navPrev.addEventListener('click',()=>go(curIndex()-1));
navNext.addEventListener('click',()=>go(curIndex()+1));
let st;book.addEventListener('scroll',()=>{clearTimeout(st);st=setTimeout(syncNav,80);});
window.addEventListener('resize',()=>go(curIndex()));

function initAfterUnlock(){
  TOTAL=Object.keys(SPOTS).length;QTOTAL=Object.keys(QUIZ).length;
  document.querySelectorAll('.card[data-spot]').forEach(card=>{const k=card.dataset.spot,on=stamps.has(k);const sb=document.createElement('button');sb.type='button';sb.className='stampbtn'+(on?' done':'');sb.setAttribute('aria-label','スタンプ');sb.textContent=on?'★':'☆';sb.addEventListener('click',e=>{e.stopPropagation();toggleStamp(k);});card.insertBefore(sb,card.firstChild);const thumb=card.querySelector('.thumb');if(thumb){const ov=document.createElement('div');ov.className='thumb-stamp';ov.innerHTML='<span>OK!</span>';ov.style.display=on?'grid':'none';thumb.appendChild(ov);}card.setAttribute('tabindex','0');card.setAttribute('role','button');card.addEventListener('click',()=>openSheet(k));card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openSheet(k);}});});
  pages=[...book.querySelectorAll('.page')];
  pages.forEach((p,i)=>{const d=document.createElement('button');d.className='dot'+(i===0?' active':'');d.setAttribute('aria-label',(i+1)+'ページ目へ');d.addEventListener('click',()=>go(i));dotsWrap.appendChild(d);});
  dots=[...dotsWrap.children];
  updateProgress();
  syncNav();
}

/* ===== LOGIN GATE ===== */
(function(){
  const gate=document.getElementById('gate'),gift=document.getElementById('gift'),passDots=document.getElementById('passDots').children,keypad=document.getElementById('keypad'),gateMsg=document.getElementById('gateMsg');
  let entered='';
  document.body.style.overflow='hidden';
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{const b=document.createElement('button');if(k===''){b.className='key ghost';b.disabled=true;b.setAttribute('aria-hidden','true');}else{b.className='key';b.textContent=k;b.addEventListener('click',()=>press(k));}keypad.appendChild(b);});
  function draw(){for(let i=0;i<4;i++)passDots[i].classList.toggle('on',i<entered.length);}
  let busy=false;
  function press(k){
    if(busy||gift.classList.contains('open'))return;
    if(k==='⌫'){entered=entered.slice(0,-1);gateMsg.textContent='';draw();return;}
    if(entered.length>=4)return;
    entered+=k;draw();
    if(entered.length===4)setTimeout(check,150);
  }
  function b64ToBuf(b64){const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;}
  async function tryUnlock(password){
    try{
      const keyMaterial=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
      const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBuf(ENC_SALT),iterations:ENC_ITER,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
      const plainBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBuf(ENC_IV)},key,b64ToBuf(ENC_DATA));
      const payload=JSON.parse(new TextDecoder().decode(plainBuf));
      document.getElementById('bookContent').outerHTML=payload.book;
      SPOTS=payload.spots;QUIZ=payload.quiz;
      return true;
    }catch(e){return false;}
  }
  async function check(){
    busy=true;gateMsg.textContent='かくにん中…';
    const ok=await tryUnlock(entered);
    busy=false;
    if(ok)success();
    else{gate.classList.add('shake');gateMsg.textContent='ちがうよ！ もういちど';setTimeout(()=>{gate.classList.remove('shake');entered='';draw();},500);}
  }
  function success(){
    gateMsg.textContent='ようこそ！ ✨';
    gift.classList.add('open');
    if(typeof initAfterUnlock==='function')initAfterUnlock();
    if(typeof confetti==='function')confetti();
    const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
    setTimeout(()=>{gate.classList.add('gone');document.body.style.overflow='';if(typeof syncNav==='function')syncNav();setTimeout(()=>{gate.style.display='none';},600);},reduce?250:1600);
  }
  document.addEventListener('keydown',e=>{if(gate.style.display==='none'||gate.classList.contains('gone'))return;if(/^[0-9]$/.test(e.key))press(e.key);else if(e.key==='Backspace')press('⌫');});
  draw();
})();
</script>
